name: 'build-void'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-void:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc:latest
      options: --user root

    steps:
      - name: install system dependencies
        run: |
          xbps-install -Syu xbps
          xbps-install -Sy \
            git \
            curl \
            nodejs \
            libwebkit2gtk41-devel \
            gtk+3-devel \
            glib-devel \
            cairo-devel \
            pango-devel \
            gdk-pixbuf-devel \
            librsvg-devel \
            libsoup3-devel \
            atk-devel \
            pkg-config \
            gcc \
            make \
            cmake \
            patch \
            bzip2 \
            xz \
            fuse

      - uses: actions/checkout@v4

      - name: install rust via rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: build (deb + rpm)
        run: tauri build --bundles deb,rpm
        working-directory: ./backend
        env:
          TAURI_CLI_NO_DEVTOOLS: true

      - name: build (appimage)
        continue-on-error: true
        run: tauri build --bundles appimage
        working-directory: ./backend
        env:
          TAURI_CLI_NO_DEVTOOLS: true
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neobdium-void-x86_64
          path: |
            backend/target/release/bundle/appimage/*.AppImage
            backend/target/release/bundle/deb/*.deb
            backend/target/release/bundle/rpm/*.rpm
          compression-level: 6
